# Snippet a ajouter dans configuration.yaml de Home Assistant.
# Remplace IP_BOT et PORT par l'IP du conteneur LXC et le port API (defaut 8080).

rest_command:
  bot_discord:
    url: "http://IP_BOT:PORT/api/notify"
    method: POST
    content_type: "application/json"
    payload: '{"id": "{{ id }}"}'
    timeout: 10

