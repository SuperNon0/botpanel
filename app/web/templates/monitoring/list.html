{% extends "base.html" %}
{% block title %}Monitoring — BotPanel{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Monitoring temps reel</h2>
  <span class="card-row-meta" id="block-count">0 bloc</span>
</div>

<div class="card" style="padding: 0;">
  <div id="block-list"></div>
</div>

<a href="/monitoring/new" class="fab" title="Nouveau bloc de monitoring">+</a>
{% endblock %}

{% block scripts %}
<script>
function fieldsCount(b) {
  try {
    const cfg = JSON.parse(b.config_json || "{}");
    return (cfg.fields || []).length;
  } catch { return 0; }
}

async function loadBlocks() {
  const list = document.getElementById("block-list");
  const count = document.getElementById("block-count");
  try {
    const blocks = await API.get("/monitoring");
    count.textContent = `${blocks.length} bloc${blocks.length > 1 ? "s" : ""}`;

    if (blocks.length === 0) {
      list.innerHTML = `<div class="empty-state">
        Aucun bloc configure.<br>Clique sur <strong>+</strong> pour en creer un.
      </div>`;
      return;
    }

    list.innerHTML = blocks.map(b => {
      const colorHex = "#" + (b.color || 0x49A0DF).toString(16).padStart(6, "0");
      return `
        <div class="card-row" style="border-left:4px solid ${colorHex};">
          <div>
            <div>
              <strong>${b.icon ? esc(b.icon) + " " : ""}${esc(b.name)}</strong>
              ${b.enabled ? '<span class="tag tag-green">ACTIF</span>' : '<span class="tag">OFF</span>'}
            </div>
            <div class="card-row-meta">
              ${fieldsCount(b)} champ${fieldsCount(b) > 1 ? "s" : ""}
              &nbsp;&middot;&nbsp; toutes les ${b.interval_seconds}s
              ${b.channel_id ? "&nbsp;&middot;&nbsp; channel #" + esc(b.channel_id) : ""}
            </div>
          </div>
          <div class="row-actions">
            <a class="btn btn-edit btn-small" href="/monitoring/${b.id}">EDITER</a>
            <button class="btn btn-danger btn-small" data-del="${b.id}">SUPPR</button>
          </div>
        </div>
      `;
    }).join("");

    list.querySelectorAll("[data-del]").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!confirm("Supprimer ce bloc ?")) return;
        try {
          await API.del(`/monitoring/${btn.dataset.del}`);
          toast("Bloc supprime");
          loadBlocks();
        } catch (e) { toast(e.message, "error"); }
      });
    });
  } catch (e) {
    list.innerHTML = `<div class="empty-state">Erreur : ${esc(e.message)}</div>`;
  }
}

loadBlocks();
</script>
{% endblock %}
